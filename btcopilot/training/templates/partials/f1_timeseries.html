<style>
.f1-timeseries-chart-container {
    position: relative;
    height: 250px;
    border-radius: 8px;
}
.f1-timeseries-legend {
    display: flex;
    flex-wrap: wrap;
    gap: 12px;
    margin-top: 10px;
    justify-content: center;
}
.f1-timeseries-legend-item {
    display: flex;
    align-items: center;
    gap: 5px;
    font-size: 0.8em;
}
.f1-timeseries-legend-dot {
    width: 10px;
    height: 10px;
    border-radius: 50%;
}
</style>

<div class="admin-section mb-5">
    <div class="box">
        <div class="level">
            <div class="level-left">
                <div class="level-item">
                    <h2 class="title is-4">
                        <span class="icon"><i class="fas fa-chart-line"></i></span>
                        F1 Score History
                    </h2>
                </div>
            </div>
            <div class="level-right">
                <div class="level-item">
                    <a href="https://patrickkidd.github.io/btcopilot/doc/f1_timeseries.html" class="button is-link is-outlined" target="_blank">
                        <span class="icon"><i class="fas fa-external-link-alt"></i></span>
                        <span>Full Page</span>
                    </a>
                </div>
            </div>
        </div>

        <div class="f1-timeseries-chart-container">
            <canvas id="f1-timeseries-chart"></canvas>
        </div>

        <div class="f1-timeseries-legend" id="f1-timeseries-legend"></div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chartjs-adapter-date-fns@3.0.0/dist/chartjs-adapter-date-fns.bundle.min.js"></script>
<script>
(function() {
    const JSON_URL = 'https://raw.githubusercontent.com/patrickkidd/btcopilot/refs/heads/master/doc/f1_timeseries.json';

    const targets = {
        aggregate: 0.50,
        people: 0.75,
        events: 0.55,
        symptom: 0.45,
        anxiety: 0.45,
        relationship: 0.45,
        functioning: 0.45
    };

    const colors = {
        aggregate: '#f59e0b',
        people: '#3b82f6',
        events: '#10b981',
        symptom: '#ef4444',
        anxiety: '#8b5cf6',
        relationship: '#ec4899',
        functioning: '#06b6d4'
    };

    const labels = {
        aggregate: 'Aggregate',
        people: 'People',
        events: 'Events',
        symptom: 'Symptom',
        anxiety: 'Anxiety',
        relationship: 'Relationship',
        functioning: 'Functioning'
    };

    async function initF1Timeseries() {
        let data;
        try {
            const response = await fetch(JSON_URL);
            data = await response.json();
        } catch (e) {
            document.getElementById('f1-timeseries-chart').parentElement.innerHTML =
                '<p class="has-text-danger">Failed to load timeseries data</p>';
            return;
        }

        // Format dates for x-axis labels (parse as local to avoid timezone shift)
        const monthNames = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
        const dateLabels = data.data.map(d => {
            const [y, m, day] = d.date.split(/[-T]/);
            return `${monthNames[parseInt(m) - 1]} ${parseInt(day)}`;
        });

        // Detect large gaps (>7 days) between consecutive entries
        const GAP_THRESHOLD_MS = 7 * 24 * 60 * 60 * 1000;
        const gapAfter = new Set();
        for (let i = 1; i < data.data.length; i++) {
            if (new Date(data.data[i].date) - new Date(data.data[i - 1].date) > GAP_THRESHOLD_MS)
                gapAfter.add(i - 1);
        }

        // Use index-based x so points are evenly spaced regardless of date gaps
        const datasets = data.metrics.map(metric => ({
            label: labels[metric],
            data: data.data.map((d, i) => ({
                x: i,
                y: d[metric]
            })).filter(d => d.y !== null),
            borderColor: colors[metric],
            backgroundColor: colors[metric] + '33',
            tension: 0.3,
            pointRadius: 4,
            pointHoverRadius: 6,
            borderWidth: 2,
            segment: {
                borderDash: function(ctx) {
                    const i0 = Math.round(ctx.p0.parsed.x);
                    const i1 = Math.round(ctx.p1.parsed.x);
                    for (let i = i0; i < i1; i++) {
                        if (gapAfter.has(i)) return [6, 4];
                    }
                    return [];
                }
            }
        }));

        // Add target lines as dashed
        data.metrics.forEach(metric => {
            const indices = data.data
                .map((d, i) => d[metric] !== null ? i : null)
                .filter(i => i !== null);
            if (indices.length > 0) {
                datasets.push({
                    label: `${labels[metric]} Target`,
                    data: [
                        { x: indices[0], y: targets[metric] },
                        { x: indices[indices.length - 1], y: targets[metric] }
                    ],
                    borderColor: colors[metric] + '66',
                    borderDash: [5, 5],
                    borderWidth: 1,
                    pointRadius: 0,
                    tension: 0
                });
            }
        });

        const ctx = document.getElementById('f1-timeseries-chart').getContext('2d');
        new Chart(ctx, {
            type: 'line',
            data: { datasets },
            options: {
                responsive: true,
                maintainAspectRatio: false,
                interaction: {
                    mode: 'index',
                    intersect: false
                },
                plugins: {
                    legend: { display: false },
                    tooltip: {
                        callbacks: {
                            title: function(items) {
                                const i = Math.round(items[0].parsed.x);
                                const d = data.data[i];
                                return d ? `${d.date} (${d.commit})` : '';
                            },
                            afterBody: function(items) {
                                const i = Math.round(items[0].parsed.x);
                                const d = data.data[i];
                                return d && d.note ? [`\n${d.note}`] : [];
                            }
                        }
                    }
                },
                scales: {
                    x: {
                        type: 'linear',
                        min: -0.5,
                        max: data.data.length - 0.5,
                        grid: { color: 'rgba(128,128,128,0.2)' },
                        ticks: {
                            color: 'inherit',
                            autoSkip: true,
                            maxTicksLimit: 12,
                            callback: function(value) {
                                const i = Math.round(value);
                                if (i >= 0 && i < dateLabels.length && Math.abs(value - i) < 0.01)
                                    return dateLabels[i];
                                return null;
                            }
                        }
                    },
                    y: {
                        min: 0,
                        max: 1,
                        grid: { color: 'rgba(128,128,128,0.2)' },
                        ticks: {
                            color: 'inherit',
                            callback: v => (v * 100).toFixed(0) + '%'
                        }
                    }
                }
            }
        });

        // Build legend
        const legendEl = document.getElementById('f1-timeseries-legend');
        data.metrics.forEach(m => {
            legendEl.innerHTML += `
                <div class="f1-timeseries-legend-item">
                    <div class="f1-timeseries-legend-dot" style="background: ${colors[m]}"></div>
                    <span>${labels[m]}</span>
                </div>
            `;
        });
    }

    if (document.readyState === 'loading') {
        document.addEventListener('DOMContentLoaded', initF1Timeseries);
    } else {
        initF1Timeseries();
    }
})();
</script>
